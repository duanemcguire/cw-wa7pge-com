{% extends 'base.html' %}


{% block content %}


  <h2>{{book_title}}</h2>
  <div class="optionContainer">
    <form id="theForm">
    <table style="max-width: 500px;">
    <tr>
    <td>WPM</td>
    <td>
    <select id="wpm">
      {% for wpm in ["12","15","18","20","22","25","28","30","35","40"] %}
        <option value="{{wpm}}" {%if wpm == selectedWPM %}selected{% endif %}>{{wpm}}</option>
      {% endfor %}
    </select>
    </td>
    </tr>
    <tr>
      <td>Word Spacing</td>
      <td>
      <select id="ws">
        {% for ws_option in ws_options %}
          <option value="{{ws_option}}" {% if ws_option == selectedWS %}selected{% endif %}>{{ws_option}}{% if ws_option == "1" %} (Standard){% endif %}</option>
        {% endfor %}
      </select>
      <span><span id="wordSpace"></span> ms</span>
      </td>
    </tr>
    <tr>
      <td>{{verse_term}}</td>
      <td>
      <select id="verseSelect">
        <option value="">Select a {{verse_term}}</option>
        {%for verse in verses %}
        <option value="{{verse.file_name}}">{{verse.display_name}}</option>
        {% endfor %}
      </select>
      </td>
    </tr>
  </table>
  </form>
  </div>
  <div>
    <button id="buttonPlayCW" style="visibility: hidden">Play the CW</button>
    <button id="buttonPauseCW" style="visibility: hidden">Pause</button>
    <button id="viewText" style="visibility: hidden">View the Text</button>
    <button id="hideText" style="visibility: hidden;">Hide the Text</button>
 </div>
 <BR>
  <div id="textDiv" style="visibility: hidden;
      overflow: scroll;
      border: 1px solid black;
      max-width: 600px;
      width:100%; height:
      400px; " >
    <div id="textContent" style="padding: 10px; font-weight:normal; font-family:Arial, Helvetica, sans-serif"></div>
  </div>

  <script>
    const bookKey = '{{ book_key }}';
    let currentVerseCW = '';
    let prefix = 'VVV  ';
    const player = new jscw();
    player.init();
    const wpmEl = document.getElementById('wpm');
    const wsEl = document.getElementById('ws');
    const verseSelect = document.getElementById('verseSelect');

    function getEWS() {
        return Number(wsEl.options[wsEl.selectedIndex].value) - 1;
    }

    function getWordSpace() {
        const speed = Number(wpmEl.value);
        const ws = Number(wsEl.value);
        const spacing = Math.floor(8400 * ws / speed);
        document.getElementById('wordSpace').innerText = spacing;
        return spacing;
    }

    function playCW(text) {
        const speed = wpmEl.options[wpmEl.selectedIndex].value;
        player.stop();
        player.init();
        player.setWpm(speed);
        player.setEws(getEWS());
        player.setFreq(600);
        player.setStartDelay(1);
        player.play(prefix + text);
        prefix = '';
    }

    async function loadVerse(verseFile) {
        const url = `/books/api/data?book=${encodeURIComponent(bookKey)}&verse=${encodeURIComponent(verseFile)}`;
        const resp = await fetch(url);
        const data = await resp.json();
        currentVerseCW = data.cw || '';
        document.getElementById('textContent').innerHTML =
            (data.text || '').replace(/\n/g, '<br>');
        document.getElementById('buttonPlayCW').style.visibility = 'visible';
        document.getElementById('buttonPauseCW').style.visibility = 'hidden';
        document.getElementById('viewText').style.visibility = 'visible';
        document.getElementById('buttonPauseCW').innerText = 'Pause';
        prefix = 'VVV  ';
    }

    getWordSpace();

    document.getElementById('viewText').addEventListener('click', function() {
        textDiv.style.visibility = 'visible';
        document.getElementById('hideText').style.visibility = 'visible';
    });
    document.getElementById('buttonPlayCW').addEventListener('click', function() {
        playCW(currentVerseCW);
        document.getElementById('buttonPauseCW').style.visibility = 'visible';
        gtag('event', 'cw_session_start', {
            tool: 'books',
            book: bookKey,
            verse: verseSelect.value,
            wpm: Number(wpmEl.value)
        });
    });
    document.getElementById('buttonPauseCW').addEventListener('click', function() {
        player.pause();
        if (buttonPauseCW.innerText === 'PAUSE') {
            buttonPauseCW.innerText = 'Continue';
        } else {
            buttonPauseCW.innerText = 'PAUSE';
        }
    });
    document.getElementById('hideText').addEventListener('click', function() {
        textDiv.style.visibility = 'hidden';
        document.getElementById('hideText').style.visibility = 'hidden';
    });
    verseSelect.addEventListener('change', async () => {
        const verseFile = verseSelect.value;
        if (verseFile) {
            await loadVerse(verseFile);
        }
    });
    wpmEl.addEventListener('change', () => {
        getWordSpace();
        if (currentVerseCW) { playCW(currentVerseCW); }
        document.getElementById('buttonPauseCW').style.visibility = 'visible';
    });
    wsEl.addEventListener('change', getWordSpace);
</script>

  {% endblock %}
