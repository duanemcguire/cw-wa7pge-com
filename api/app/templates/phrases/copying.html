{% extends 'base.html' %}

{% block content %}

<style>
    button {margin-bottom: 4px;}
    @media (max-width: 768px) {
        #hotkeys {
            display: none;
        }
    }
</style>
<body>
    <h2>Phrase Copy Practice</h2>


    <form id='theForm'>
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px;">
            <span>WPM:
            <select name="wpm" id="wpm" style="width: 95px;">
                {% for wpmo in wpm_options %}
                    <option value="{{ wpmo }}" {% if wpmo|int == wpm|int %}selected{% endif %}>{{ wpmo }}</option>
                {% endfor %}
            </select>
            <span style="display:block; visibility:hidden;">0 ms</span></span>
            <span>Word Spacing:
            <select name="ws" id="ws" style="width: 150px;">
                {% for ws_option in ws_options %}
                    <option value="{{ ws_option }}" {% if ws_option == ws %}selected{% endif %}>{{ ws_option }}{% if ws_option == "1" %} (Standard){% endif %}</option>
                {% endfor %}
            </select>
            <span><span id="wordSpace"></span> ms</span></span>
        </div>

        Category: <select id='category' style="max-width: 200px;">
            {% for category in categories %}
            <option value="{{ category }}" {% if category==selected_category %}selected{% endif %}>{{ category }}</option>
            {% endfor %}
        </select>

        Collection: <select id="selectCollection" style="width: 200px;">
            {% for file in files %}
                <option value="{{ file }}" {% if file == selected_file %}selected{% endif %}>{{ file }}</option>
            {% endfor %}
        </select>

    </form>


    <button id="buttonGetPhrase"><span style="text-decoration:underline">G</span>et a Phrase</button><BR>
    <button id="buttonPlayCW"  style="visibility: hidden;"><span style="text-decoration:underline">P</span>lay the CW</button>
    <button id="buttonDisplayTitle" style="visibility: hidden;"><span style="text-decoration:underline">R</span>eveal the Phrase</button>
    <button id="buttonHideTitle" style="visibility: hidden;"><span style="text-decoration:underline">H</span>ide the Phrase</button>
    <div class="line-display" id="reveal_title" style="display:none;"></div>

    <div id="hotkeys">
        <BR>
        Hot Keys:
        <ul>
            <li>Right Arrow: Get the next phrase</li>
            <li>Left Arrow: Play the CW again</li>
            <li>Up Arrow: Reveal the phrase</li>
            <li>Down Arrow: Hide the phrase</li>
            <li>Space: Pause</li>
        </ul>
    </div>


<script>
    let lines = [];
    let prefix = 'VVV  ';
    let line = '';
    let _cwSessionStarted = false;
    const player = new jscw();
    player.init();

    const categoryEl = document.getElementById('category');
    const collectionEl = document.getElementById('selectCollection');

    async function loadCollections(category) {
        const resp = await fetch('/phrases/api/index');
        const data = await resp.json();
        const files = data.files_by_category[category] || [];
        collectionEl.innerHTML = '';
        for (const f of files) {
            const opt = document.createElement('option');
            opt.value = f;
            opt.textContent = f;
            collectionEl.appendChild(opt);
        }
        return files[0] || '';
    }

    async function loadLines(category, file) {
        const url = `/phrases/api/data?category=${encodeURIComponent(category)}&file=${encodeURIComponent(file)}`;
        const resp = await fetch(url);
        const data = await resp.json();
        lines = data.lines || [];
    }

    function play_cw(text){
        player.stop();
        player.init();
        const wpmEl = document.getElementById('wpm');
        const speed = wpmEl.options[wpmEl.selectedIndex].value;
        player.setWpm(speed);
        player.ews = getEWS();
        player.setFreq(600);
        player.setStartDelay(1);
        player.play(prefix + text);
        prefix = '';
    }
    function getEWS(){
        const wsEl = document.getElementById('ws');
        return wsEl.options[wsEl.selectedIndex].value - 1;
    }
    function getWordSpace() {
        const wpmEl = document.getElementById('wpm');
        const wsEl = document.getElementById('ws');
        const speed = Number(wpmEl.value);
        const ws = Number(wsEl.value);
        const spacing = Math.floor(8400 * ws / speed);
        document.getElementById('wordSpace').innerText = spacing;
        return spacing;
    }
    function getLine(){
        const randomIndex = Math.floor(Math.random() * lines.length);
        let l = lines[randomIndex].trim().replace('~', ' ');
        l = l.replace('(', ' = ').replace(')', ' = ');
        return l;
    }
    function getNext(){
        if (!_cwSessionStarted) {
            _cwSessionStarted = true;
            gtag('event', 'cw_session_start', {
                tool: 'phrase_copy',
                wpm: Number(document.getElementById('wpm').value),
                category: categoryEl.value,
                collection: collectionEl.value
            });
        }
        if (lines.length > 0){
            line = getLine();
            play_cw(line);
            document.getElementById('reveal_title').innerText = line;
            buttonPlayCW.style.visibility = 'visible';
            buttonDisplayTitle.style.visibility = 'visible';
            buttonHideTitle.style.visibility = 'hidden';
            document.getElementById('reveal_title').style.display = 'none';
        }
    }

    document.getElementById('ws').addEventListener('change', getWordSpace);
    document.getElementById('wpm').addEventListener('change', getWordSpace);

    categoryEl.addEventListener('change', async () => {
        const firstFile = await loadCollections(categoryEl.value);
        await loadLines(categoryEl.value, firstFile);
    });
    collectionEl.addEventListener('change', async () => {
        await loadLines(categoryEl.value, collectionEl.value);
    });
    buttonPlayCW.addEventListener('click', () => { play_cw(line); });
    buttonDisplayTitle.addEventListener('click', () => {
        document.getElementById('reveal_title').style.display = 'block';
        buttonHideTitle.style.visibility = 'visible';
    });
    buttonHideTitle.addEventListener('click', () => {
        document.getElementById('reveal_title').style.display = 'none';
        buttonHideTitle.style.visibility = 'hidden';
    });
    buttonGetPhrase.addEventListener('click', () => { getNext(); });

    window.addEventListener("keydown", function(e) {
        if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
            e.preventDefault();
        }
    }, false);
    document.addEventListener('keydown', function(event) {
        if (event.key === 'g' || event.key === 'ArrowRight') { getNext(); }
        if (event.key === 'p' || event.key === 'ArrowLeft')  { play_cw(line); }
        if (event.key === 'r' || event.key === 'ArrowUp') {
            document.getElementById('reveal_title').style.display = 'block';
            buttonHideTitle.style.visibility = 'visible';
        }
        if (event.key === 'h' || event.key === 'ArrowDown') {
            document.getElementById('reveal_title').style.display = 'none';
            buttonHideTitle.style.visibility = 'hidden';
        }
        if (event.key === ' ') { player.pause(); }
    });

    // Load initial data
    loadLines('{{ selected_category }}', '{{ selected_file }}');
    getWordSpace();
</script>
{% endblock %}
