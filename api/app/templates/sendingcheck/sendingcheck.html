{% extends 'base.html' %}

{% block content %}
<script src="/static/sendingcheck/js/morse.js" defer></script>
<script src="/static/sendingcheck/js/audio.js" defer></script>
<script src="/static/sendingcheck/js/viz.js" defer></script>
<script src="/static/sendingcheck/js/app.js" defer></script>

<style>
  .sc-panels {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 1em;
    margin-bottom: 1em;
  }

  .sc-panel {
    border: 1px solid rgba(210, 215, 217, 0.75);
    border-radius: 0.375em;
    padding: 1em;
  }

  .sc-panel-title {
    font-family: "Roboto Slab", serif;
    font-size: 0.65em;
    color: #3d4449;
    text-transform: uppercase;
    letter-spacing: 0.075em;
    margin-bottom: 0.75em;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #sourceText {
    width: 100%;
    height: 130px;
    background: #f9fafb;
    border: 1px solid rgba(210, 215, 217, 0.75);
    border-radius: 0.375em;
    color: #3d4449;
    font-family: "Open Sans", sans-serif;
    font-size: 0.85em;
    padding: 0.5em 0.75em;
    resize: vertical;
    line-height: 1.65;
    transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
  }
  #sourceText:focus {
    outline: none;
    border-color: #f56a6a;
    box-shadow: 0 0 0 2px rgba(245, 106, 106, 0.15);
  }

  .sc-load-btn {
    background: transparent;
    border: 2px solid #f56a6a;
    color: #f56a6a;
    border-radius: 0.375em;
    padding: 0.2em 0.75em;
    font-family: "Roboto Slab", serif;
    font-size: 0.75em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.075em;
    cursor: pointer;
    transition: background 0.2s ease-in-out;
    box-shadow: none;
  }
  .sc-load-btn:hover { background: rgba(245, 106, 106, 0.08); }

  .sc-display-panel {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 155px;
  }

  .sc-line-counter {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 0.65em;
    color: #9fa3a6;
  }

  #currentLine {
    font-family: "Roboto Slab", serif;
    font-size: 2rem;
    color: #3d4449;
    text-align: center;
    word-break: break-all;
    padding: 0 16px;
  }

  .sc-tune-controls {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0.75em 1em;
    background: #f5f6f7;
    border: 1px solid rgba(210, 215, 217, 0.75);
    border-radius: 0.375em;
    margin-bottom: 1em;
  }

  .sc-ctrl-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .sc-ctrl-group label {
    font-family: "Roboto Slab", serif;
    font-size: 0.58em;
    color: #7f888f;
    text-transform: uppercase;
    letter-spacing: 0.075em;
    white-space: nowrap;
  }

  .sc-ctrl-group input[type="range"] {
    width: 110px;
    accent-color: #f56a6a;
    cursor: pointer;
  }

  .sc-ctrl-group input[type="number"] {
    width: 72px;
    background: #ffffff;
    border: 1px solid rgba(210, 215, 217, 0.75);
    border-radius: 0.375em;
    color: #3d4449;
    font-family: "Open Sans", sans-serif;
    font-size: 0.85em;
    text-align: center;
    padding: 4px 6px;
    transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
    height: auto;
    box-shadow: none;
  }
  .sc-ctrl-group input[type="number"]:focus {
    outline: none;
    border-color: #f56a6a;
    box-shadow: 0 0 0 2px rgba(245, 106, 106, 0.15);
  }

  .sc-pitch-val {
    font-size: 0.7em;
    color: #9fa3a6;
  }

  .sc-viz-panel {
    border: 1px solid rgba(210, 215, 217, 0.75);
    border-radius: 0.375em;
    padding: 0.75em 1em;
    margin-bottom: 1em;
  }

  .sc-viz-legend {
    display: flex;
    gap: 16px;
    font-size: 0.72em;
    margin-bottom: 0.5em;
  }
  .sc-viz-legend .ref  { color: #4ade80; }
  .sc-viz-legend .user { color: #f87171; }

  #vizCanvas {
    display: block;
    width: 100%;
    border-radius: 0.25em;
  }

  .sc-scale-bar {
    margin-top: 6px;
    height: 32px;
    background: #f5f6f7;
    border: 1px solid rgba(210, 215, 217, 0.75);
    border-radius: 0.375em;
    cursor: ew-resize;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    transition: background 0.2s ease-in-out, border-color 0.2s ease-in-out;
  }
  .sc-scale-bar:hover,
  .sc-scale-bar.dragging { background: #eef0f2; border-color: #f56a6a; }

  .sc-scale-bar-label {
    font-family: "Roboto Slab", serif;
    font-size: 1.1rem;
    color: #7f888f;
    letter-spacing: 0.04em;
    pointer-events: none;
  }
  .sc-scale-bar:hover .sc-scale-bar-label,
  .sc-scale-bar.dragging .sc-scale-bar-label { color: #f56a6a; }

  .sc-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 0.5em 0 0.75em;
    flex-wrap: wrap;
  }

  .sc-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 1.5em;
    height: 3.5em;
    border-radius: 0.375em;
    border: 2px solid rgba(210, 215, 217, 0.75);
    background: transparent;
    color: #3d4449;
    font-family: "Roboto Slab", serif;
    font-size: 0.8em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.075em;
    cursor: pointer;
    transition: background 0.2s ease-in-out, border-color 0.2s ease-in-out;
    min-width: 44px;
    box-shadow: none;
  }
  .sc-btn:hover { background: rgba(210, 215, 217, 0.2); border-color: #3d4449; }
  .sc-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  #startBtn {
    background: #f56a6a;
    color: #ffffff;
    border-color: #f56a6a;
    min-width: 160px;
  }
  #startBtn:hover { background: #e85555; border-color: #e85555; }
  #startBtn.recording {
    background: #3d4449;
    color: #ffffff;
    border-color: #3d4449;
  }
  #startBtn.recording:hover { background: #2d3439; border-color: #2d3439; }

  .sc-btn-play {
    border-color: #f56a6a;
    color: #f56a6a;
  }
  .sc-btn-play:hover { background: rgba(245, 106, 106, 0.08); border-color: #f56a6a; }
</style>

<h2>CW Sending Check</h2>
<p style="margin-bottom: 1em;">Analyze your Morse code keying accuracy against a perfect reference.</p>

<div class="sc-panels">
  <div class="sc-panel">
    <div class="sc-panel-title">
      Source Text
      <button class="sc-load-btn" onclick="loadText()">Load ↑</button>
    </div>
    <textarea id="sourceText">can you help</textarea>
  </div>

  <div class="sc-panel sc-display-panel">
    <div class="sc-line-counter" id="lineCounter">Line 1/1</div>
    <div id="currentLine"></div>
  </div>
</div>

<div class="sc-tune-controls">
  <div class="sc-ctrl-group">
    <label>♪ Pitch</label>
    <input type="range" id="pitch" min="400" max="1200" value="700" step="10">
    <span class="sc-pitch-val" id="pitchVal">700 Hz</span>
  </div>
  <div class="sc-ctrl-group">
    <label>Speed (WPM)</label>
    <input type="number" id="wpm" value="17" min="5" max="60" step="0.5">
  </div>
  <div class="sc-ctrl-group">
    <label>Word Spacing (×)</label>
    <input type="number" id="wordSpacing" value="1.0" min="0.8" max="3.0" step="0.1">
  </div>
  <div class="sc-ctrl-group">
    <label>🎤 Mic Sensitivity</label>
    <input type="range" id="sensitivity" min="0.05" max="1" value="0.4" step="0.01"
           title="Slide right for acoustic/mic pickup. Slide left if signal is not being detected.">
  </div>
</div>

<div class="sc-viz-panel">
  <div class="sc-viz-legend">
    <span class="ref">▬ Reference (perfect)</span>
    <span class="user">▬ Your sending</span>
  </div>
  <canvas id="vizCanvas"></canvas>
  <div class="sc-scale-bar" id="scaleBar" title="Drag left/right to scale the time axis">
    <span class="sc-scale-bar-label" id="scaleLabel">◂ 7.0 seconds/row ▸</span>
  </div>
</div>

<div class="sc-controls">
  <button class="sc-btn" onclick="prevLine()" title="Previous line">&#8249;</button>
  <button class="sc-btn" id="startBtn" onclick="startStop()">⟳ Start Listening</button>
  <button class="sc-btn" onclick="nextLine()" title="Next line">&#8250;</button>
  <button class="sc-btn sc-btn-play" id="playRefBtn"  onclick="playReference()" title="Play perfect reference CW">▶ Reference</button>
  <button class="sc-btn sc-btn-play" id="playUserBtn" onclick="playUser()"      title="Play back your recorded sending">▶ Your sending</button>
</div>

{% endblock %}
